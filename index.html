<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#E4ECFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pass Store</title>
<link rel="stylesheet" href="css/style.css">
<style>
.lang-row{
  position:absolute;bottom:56px;left:0;right:0;
  display:flex;justify-content:center;gap:10px;
  animation:slideUp 0.5s var(--spring-soft) 1.4s both;
  z-index:2;
}
.splash-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);opacity:0.5;display:inline-block;
  animation:pulse 1.6s ease-in-out 1.2s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.4);opacity:0.9}}
.splash-badge{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:0;
  margin-top:-40px;
}
</style>
</head>
<body>
<div class="splash-screen" id="splash">
  <div class="splash-badge">
    <div class="splash-logo-wrap">🔐</div>
    <div class="splash-name">Pass Store</div>
    <div class="splash-tagline" data-i18n="tagline">Secure Your Digital Identity</div>
    <div class="splash-progress" style="margin-top:40px">
      <div class="splash-progress-bar"></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:6px">
      <div class="splash-dot" style="animation-delay:0s"></div>
      <div class="splash-dot" style="animation-delay:0.2s"></div>
      <div class="splash-dot" style="animation-delay:0.4s"></div>
    </div>
  </div>
  <div class="lang-row">
    <button class="lang-chip" data-lang="en">English</button>
    <button class="lang-chip" data-lang="hi">हिंदी</button>
    <button class="lang-chip" data-lang="hl">Hinglish</button>
  </div>
</div>

<script src="js/lang.js"></script>
<script src="js/app.js"></script>
<script type="module">
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  setTimeout(() => {
    onAuthStateChanged(auth, (user) => {
      const splash = document.getElementById('splash');
      splash.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      splash.style.opacity = '0';
      splash.style.transform = 'scale(1.05)';
      setTimeout(() => {
        if (user) {
          window.location.href = 'home.html';
        } else {
          window.location.href = 'login.html';
        }
      }, 500);
    });
  }, 2600);
</script>
</body>
</html>
