<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#E4ECFF">
<title>404 — Pass Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper" style="align-items:center;justify-content:center;padding:32px">
  <div class="glass" style="border-radius:var(--radius-2xl);padding:40px 32px;text-align:center;max-width:320px;width:100%;animation:scaleIn 0.5s var(--spring) both">
    <div style="font-size:72px;margin-bottom:16px">🔍</div>
    <div style="font-size:48px;font-weight:800;letter-spacing:-3px;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px">404</div>
    <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px">Page Not Found</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:28px;line-height:1.6">The page you're looking for doesn't exist or has been moved.</div>
    <a href="home.html" class="btn btn-primary">Go to Vault</a>
  </div>
</div>
<script src="js/lang.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
